<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="'Saira',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#7d8da0"/>
    </marker>
    <style>
      .box{rx:12;}
      .lbl{fill:#e7eef5;font-weight:600;font-size:15px;}
      .sub{fill:#aebccb;font-size:11.5px;}
      .grp{fill:#7d8da0;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600;}
      .flow{stroke:#7d8da0;stroke-width:1.6;fill:none;marker-end:url(#arr);}
      .flowt{fill:#7d8da0;font-size:10.5px;}
    </style>
  </defs>

  <rect width="960" height="470" fill="#070b11"/>

  <!-- group bands -->
  <text x="120" y="34" class="grp" text-anchor="middle">Field (real world)</text>
  <text x="480" y="34" class="grp" text-anchor="middle">DIMS Cloud (our backend)</text>
  <text x="840" y="34" class="grp" text-anchor="middle">Browser (console)</text>

  <line x1="240" y1="50" x2="240" y2="440" stroke="#1b2636" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="720" y1="50" x2="720" y2="440" stroke="#1b2636" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- FIELD -->
  <g>
    <rect x="40" y="70" width="170" height="78" rx="12" fill="#0f1a27" stroke="#2dd4bf" stroke-opacity="0.5"/>
    <text x="125" y="100" class="lbl" text-anchor="middle">🏗️ DJI Dock 3</text>
    <text x="125" y="122" class="sub" text-anchor="middle">weatherproof base</text>
    <text x="125" y="138" class="sub" text-anchor="middle">charges + launches</text>

    <rect x="40" y="172" width="170" height="78" rx="12" fill="#0f1a27" stroke="#2dd4bf" stroke-opacity="0.5"/>
    <text x="125" y="202" class="lbl" text-anchor="middle">✈️ Matrice 4TD</text>
    <text x="125" y="224" class="sub" text-anchor="middle">RGB · thermal · laser</text>
    <text x="125" y="240" class="sub" text-anchor="middle">flies the mission</text>

    <rect x="40" y="274" width="170" height="64" rx="12" fill="#0f1a27" stroke="#1b2636"/>
    <text x="125" y="300" class="lbl" text-anchor="middle" font-size="13">📡 RTK base</text>
    <text x="125" y="320" class="sub" text-anchor="middle">cm-level position</text>
  </g>

  <!-- CLOUD -->
  <g>
    <rect x="300" y="70" width="340" height="300" rx="14" fill="#0b111a" stroke="#1b2636"/>
    <text x="470" y="92" class="grp" text-anchor="middle" fill="#2dd4bf">DIMS Backend · Python / FastAPI</text>

    <rect x="320" y="108" width="140" height="60" rx="10" fill="#101b29" stroke="#1b2636"/>
    <text x="390" y="133" class="lbl" text-anchor="middle" font-size="13">MQTT broker</text>
    <text x="390" y="151" class="sub" text-anchor="middle">Cloud API link</text>

    <rect x="480" y="108" width="140" height="60" rx="10" fill="#101b29" stroke="#1b2636"/>
    <text x="550" y="133" class="lbl" text-anchor="middle" font-size="13">MediaMTX</text>
    <text x="550" y="151" class="sub" text-anchor="middle">live video relay</text>

    <rect x="320" y="182" width="140" height="60" rx="10" fill="#101b29" stroke="#1b2636"/>
    <text x="390" y="207" class="lbl" text-anchor="middle" font-size="13">Mission engine</text>
    <text x="390" y="225" class="sub" text-anchor="middle">plan · dispatch · log</text>

    <rect x="480" y="182" width="140" height="60" rx="10" fill="#0f1f1c" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <text x="550" y="203" class="lbl" text-anchor="middle" font-size="13">🔥 AI engine</text>
    <text x="550" y="221" class="sub" text-anchor="middle">YOLO on GPU</text>
    <text x="550" y="236" class="sub" text-anchor="middle">→ raycast → alert</text>

    <rect x="320" y="256" width="300" height="56" rx="10" fill="#101b29" stroke="#1b2636"/>
    <text x="470" y="280" class="lbl" text-anchor="middle" font-size="13">🗄️ PostgreSQL database</text>
    <text x="470" y="299" class="sub" text-anchor="middle">missions · telemetry · alerts · devices</text>

    <text x="470" y="345" class="sub" text-anchor="middle" font-size="11">REST + SSE API exposed to the browser ↑</text>
  </g>

  <!-- BROWSER -->
  <g>
    <rect x="750" y="90" width="180" height="260" rx="14" fill="#0b111a" stroke="#60a5fa" stroke-opacity="0.45"/>
    <text x="840" y="114" class="grp" text-anchor="middle" fill="#60a5fa">Next.js · React · Cesium</text>
    <rect x="768" y="128" width="144" height="60" rx="10" fill="#101b29" stroke="#1b2636"/>
    <text x="840" y="153" class="lbl" text-anchor="middle" font-size="13">3D twin + HUD</text>
    <text x="840" y="171" class="sub" text-anchor="middle">drone on terrain</text>
    <rect x="768" y="200" width="144" height="60" rx="10" fill="#101b29" stroke="#1b2636"/>
    <text x="840" y="225" class="lbl" text-anchor="middle" font-size="13">Live video + AI</text>
    <text x="840" y="243" class="sub" text-anchor="middle">boxes on footage</text>
    <rect x="768" y="272" width="144" height="60" rx="10" fill="#101b29" stroke="#1b2636"/>
    <text x="840" y="297" class="lbl" text-anchor="middle" font-size="13">Mission planner</text>
    <text x="840" y="315" class="sub" text-anchor="middle">+ alerts feed</text>
  </g>

  <!-- flows -->
  <path class="flow" d="M210,128 C255,128 260,135 300,135"/>
  <text x="250" y="118" class="flowt" text-anchor="middle">commands</text>
  <path class="flow" d="M300,150 C262,150 255,205 210,205"/>
  <text x="252" y="182" class="flowt" text-anchor="middle">telemetry</text>
  <path class="flow" d="M210,210 C250,210 255,150 300,150" opacity="0"/>
  <path class="flow" d="M210,300 C250,300 255,150 300,140"/>

  <path class="flow" d="M640,150 C690,150 700,150 750,150"/>
  <text x="695" y="140" class="flowt" text-anchor="middle">video</text>
  <path class="flow" d="M640,225 C690,225 700,225 750,225"/>
  <text x="695" y="215" class="flowt" text-anchor="middle">data + alerts</text>
  <path class="flow" d="M750,300 C700,300 690,300 642,300"/>
  <text x="695" y="290" class="flowt" text-anchor="middle">new mission</text>

  <text x="480" y="430" class="sub" text-anchor="middle" font-size="12">End-to-end: the dock launches the drone → it streams telemetry &amp; video to the DIMS cloud → AI finds fire/defects and pins real coordinates → the browser shows it all live.</text>
</svg>
