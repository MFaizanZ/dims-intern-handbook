<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="'Saira',system-ui,sans-serif">
  <defs>
    <marker id="rg-arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f5a524"/>
    </marker>
    <style>
      .lbl{fill:#e7eef5;font-size:13px;font-weight:600;}
      .sub{fill:#aebccb;font-size:11.5px;}
      .mono{font-family:'JetBrains Mono',monospace;}
      .ax{fill:#7d8da0;font-size:10.5px;}
    </style>
  </defs>
  <rect width="960" height="430" fill="#070b11"/>

  <!-- terrain (DSM profile) -->
  <path d="M40,360 C180,330 280,350 380,320 C470,294 560,320 660,300 C760,282 850,300 920,296 L920,400 L40,400 Z"
        fill="#10202a" stroke="#2dd4bf" stroke-opacity="0.45" stroke-width="2"/>
  <text x="70" y="392" class="ax">DSM surface  z = h(x, y)   ·   from DJI Terra</text>

  <!-- camera / drone at top -->
  <g transform="translate(150,80)">
    <circle r="11" fill="#e7eef5"/>
    <rect x="-22" y="-4" width="10" height="8" rx="2" fill="#e7eef5"/>
    <rect x="12" y="-4" width="10" height="8" rx="2" fill="#e7eef5"/>
    <text x="-4" y="-22" class="lbl" text-anchor="middle">C — camera</text>
    <text x="-4" y="-7" class="sub mono" text-anchor="middle" transform="translate(0,40)"></text>
  </g>
  <text x="150" y="44" class="sub mono" text-anchor="middle">C = (x, y, z)  ← drone RTK lat/lon/alt</text>

  <!-- image plane -->
  <g transform="translate(205,150) rotate(34)">
    <rect x="0" y="-34" width="92" height="68" rx="3" fill="#16202e" stroke="#3b82f6" stroke-opacity="0.7"/>
    <rect x="40" y="-6" width="14" height="12" fill="none" stroke="#f5a524" stroke-width="2.5"/>
    <text x="46" y="-14" fill="#f5a524" font-size="9" text-anchor="middle">u,v</text>
  </g>
  <text x="250" y="205" class="sub" text-anchor="middle">image plane (pixel u,v = bbox centre)</text>

  <!-- FOV cone (dashed) -->
  <line x1="150" y1="80" x2="430" y2="250" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="150" y1="80" x2="600" y2="150" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.5"/>
  <text x="330" y="150" fill="#60a5fa" font-size="11">FOV (intrinsics: 74.3°×46.2°)</text>

  <!-- the ray -->
  <line x1="150" y1="80" x2="612" y2="300" stroke="#f5a524" stroke-width="2.4" marker-end="url(#rg-arr)"/>
  <text x="360" y="206" fill="#f5a524" font-size="12.5" class="mono" transform="rotate(25 360 206)">P(t) = C + t·d</text>

  <!-- gimbal pitch angle arc -->
  <line x1="150" y1="80" x2="290" y2="80" stroke="#7d8da0" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M210,80 A60,60 0 0,1 196,108" fill="none" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="232" y="103" fill="#a78bfa" font-size="11">θ — gimbal pitch (+ heading, roll → R)</text>

  <!-- hit point -->
  <circle cx="612" cy="300" r="7" fill="#f87171"/>
  <path d="M612,300 l0,-46" stroke="#f87171" stroke-width="2" stroke-dasharray="3 3"/>
  <circle cx="612" cy="254" r="4" fill="#f87171"/>
  <text x="624" y="292" class="lbl" fill="#f87171">P(t*) — hit</text>
  <text x="624" y="308" class="sub mono" fill="#f87171">→ lat, lon, elev (WGS84)</text>

  <!-- d direction label near camera -->
  <text x="150" y="64" class="sub mono" text-anchor="middle" fill="#f5a524">d = R · ray(u,v)</text>

  <text x="480" y="424" class="ax" text-anchor="middle">Find the smallest t &gt; 0 where the ray meets the surface, then convert that point back to latitude/longitude.</text>
</svg>
